<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">深大 AI CRM emblem</title>
  <desc id="desc">A Shenzhen University inspired red and gold course-project emblem.</desc>
  <defs>
    <linearGradient id="ring" x1="18" y1="8" x2="78" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d0443f"/>
      <stop offset="1" stop-color="#8f1d22"/>
    </linearGradient>
    <linearGradient id="gold" x1="28" y1="18" x2="70" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7d377"/>
      <stop offset="1" stop-color="#c99728"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="45" fill="#fff8ef"/>
  <circle cx="48" cy="48" r="43" fill="url(#ring)"/>
  <circle cx="48" cy="48" r="34" fill="#fffaf2" stroke="url(#gold)" stroke-width="3"/>
  <path d="M48 16l5.8 12 13.2 1.9-9.6 9.2 2.3 13-11.7-6.2-11.7 6.2 2.3-13-9.6-9.2 13.2-1.9L48 16z" fill="url(#gold)" opacity=".95"/>
