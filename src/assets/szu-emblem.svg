  <text x="48" y="76" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="12" font-weight="700" letter-spacing="2" fill="#8f1d22">SZU</text>
  <text x="48" y="88" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="7" font-weight="700" letter-spacing="1.2" fill="#f8df9a">1983</text>
